<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Tartufaio - Mappa Ricerca</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #5c4033;
            --primary-light: #8b5a2b;
            --accent: #d2b48c;
            --bg: #fdfbf7;
            --card-bg: #ffffff;
            --text: #2e2520;
            --border: #e8e2da;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 60px; height: 100vh; display: flex; flex-direction: column; }

        header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 15px 20px; text-align: center; border-bottom: 3px solid var(--accent); }
        header h1 { font-size: 1.8rem; }

        nav { background-color: #efeae2; padding: 10px; text-align: center; border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; }
        nav a { color: var(--primary); text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 4px; }
        nav a:hover, nav a.active { background-color: var(--card-bg); }

        /* Area Mappa a tutto schermo sotto i menu */
        #map-container { flex: 1; position: relative; width: 100%; }
        #map { width: 100%; height: 100%; z-index: 1; }

        /* Bottone Flottante GPS */
        .gps-btn {
            position: absolute;
            bottom: 25px;
            left: 20px;
            z-index: 1000;
            background-color: #ffffff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 10px 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: #333;
        }
        .gps-btn:hover { background-color: #f4f4f4; }

        footer { text-align: center; padding: 10px; color: #6e6259; font-size: 0.85rem; background-color: #efeae2; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <h1>Il Tartufaio</h1>
    </header>

    <nav>
        <a href="index.html">📅 Calendario</a>
        <a href="ricerca.html" class="active">🗺️ Mappa Ricerca</a>
        <a href="quiz.html">🎓 Esame</a>
    </nav>

    <div id="map-container">
        <div id="map"></div>
        
        <button class="gps-btn" onclick="trovaPosizione()">📍 Centra GPS</button>
    </div>

    <footer>Mappa Geoscopio RT &copy; 2026</footer>

    <script>
        // Initialize map centered roughly on Tuscany
        const map = L.map('map').setView([43.4000, 11.1000], 9);

        // Mappa di base: OpenStreetMap (strade, sentieri e topografia base)
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

// CONFIGURAZIONE LIVELLI REGIONE TOSCANA (SERVER REALE GEOSCOPIO)
const wmsUrl = "https://www502.regione.toscana.it/wmsre/com.rt.wms.RTwms/wms";

// 1. Reticolo Idrografico Nazionale/Regionale completo
const idrografia = L.tileLayer.wms(wmsUrl, {
    layers: 'rt_idrografia.reticolo', // Verifica questo nome o usa il catastale sotto
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    crs: L.CRS.EPSG3857, // Forza la proiezione web corretta
    attribution: 'Regione Toscana'
}).addTo(map);

// 2. Livello di Uso del Suolo (Boschi e vegetazione) aggiornato
const usoSuolo = L.tileLayer.wms(wmsUrl, {
    layers: 'rt_usosuolo.clc18', // Versione aggiornata al 2018 (clc18 invece di clc06)
    format: 'image/png',
    transparent: true,
    version: '1.3.0',
    opacity: 0.5,
    crs: L.CRS.EPSG3857,
    attribution: 'Regione Toscana'

    // LAYER DI TEST: Confini amministrativi regionali
const confini = L.tileLayer.wms(wmsUrl, {
    layers: 'rt_confini.regione',
    format: 'image/png',
    transparent: true,
    version: '1.3.0'

}).addTo(map);

        // Pannello di controllo dei livelli (Layer Control in alto a destra)
        const baseMaps = {
            "Mappa Sentieri (OSM)": osm
        };

        const overlayMaps = {
            "🌊 Fiumi e Fossi (RT)": idrografia,
            "🌳 Mappa Boschi / Suolo (RT)": usoSuolo
        };

        L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // GESTIONE GEOLOCALIZZAZIONE GPS IN TEMPO REALE
        let userMarker = null;
        let userCircle = null;

        function trovaPosizione() {
            if (!navigator.geolocation) {
                alert("La geolocalizzazione non è supportata dal tuo dispositivo.");
                return;
            }

            // Richiesta di posizione ad alta precisione (GPS)
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    // Se esiste già il marker della tua posizione, rimuovilo prima di aggiornare
                    if (userMarker) {
                        map.removeLayer(userMarker);
                        map.removeLayer(userCircle);
                    }

                    // Crea un pallino blu sulla tua posizione esatta nel bosco
                    userMarker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`<b>Sei qui</b><br>Accuratezza GPS: ${Math.round(accuracy)} metri`).openPopup();

                    // Cerchio di tolleranza dell'accuratezza del segnale
                    userCircle = L.circle([lat, lon], { radius: accuracy, color: '#1a73e8', fillOpacity: 0.15 }).addTo(map);

                    // Centra e zooma la mappa in modo ravvicinato sulla tua posizione
                    map.setView([lat, lon], 16);
                },
                (error) => {
                    alert("Impossibile rilevare la posizione. Assicurati che il GPS sia attivo.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    </script>
</body>
</html>
