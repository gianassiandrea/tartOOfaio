<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Tartufaio - Mappa Ricerca</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #5c4033;
            --primary-light: #8b5a2b;
            --accent: #d2b48c;
            --bg: #fdfbf7;
            --card-bg: #ffffff;
            --text: #2e2520;
            --border: #e8e2da;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 60px; height: 100vh; display: flex; flex-direction: column; }

        header { background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: white; padding: 15px 20px; text-align: center; border-bottom: 3px solid var(--accent); }
        header h1 { font-size: 1.8rem; }

        nav { background-color: #efeae2; padding: 10px; text-align: center; border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; }
        nav a { color: var(--primary); text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 4px; }
        nav a:hover, nav a.active { background-color: var(--card-bg); }

        #map-container { flex: 1; position: relative; width: 100%; background-color: #e5e3df; }
        #map { width: 100%; height: 100%; z-index: 1; }

        .gps-btn {
            position: absolute;
            bottom: 25px;
            left: 20px;
            z-index: 1000;
            background-color: #ffffff;
            border: 2px solid rgba(0,0,0,0.2);
            border-radius: 4px;
            padding: 10px 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            color: #333;
        }
        .gps-btn:hover { background-color: #f4f4f4; }

        footer { text-align: center; padding: 10px; color: #6e6259; font-size: 0.85rem; background-color: #efeae2; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <h1>Il Tartufaio</h1>
    </header>

    <nav>
        <a href="index.html">📅 Calendario</a>
        <a href="ricerca.html" class="active">🗺️ Mappa Ricerca</a>
        <a href="quiz.html">🎓 Esame</a>
    </nav>

    <div id="map-container">
        <div id="map"></div>
        <button class="gps-btn" onclick="trovaPosizione()">📍 Centra GPS</button>
    </div>

    <footer>Mappa Ambientale Nazionale &copy; 2026</footer>

    <script>
        // Inizializza la mappa centrata sulla Toscana
        const map = L.map('map').setView([43.4000, 11.1000], 9);

        // Mappa base stradale e sentieri (OpenStreetMap)
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // 1. LIVELLO GEO-PORTALE NAZIONALE: RETICOLO IDROGRAFICO COMPLETO (HTTPS Sicuro)
        const idrografia = L.tileLayer.wms("https://wms.pcn.minambiente.it/ogc/wms", {
            layers: 'RN.RETICOLOIDROGRAFICO',
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            attribution: 'Ministero Ambiente'
        }).addTo(map);

        // 2. LIVELLO GEO-PORTALE NAZIONALE: CARTA DELLA COPERTURA DEL SUOLO / BOSCHI (Corine Land Cover HTTPS)
        const usoSuolo = L.tileLayer.wms("https://wms.pcn.minambiente.it/ogc/wms", {
            layers: 'corine_land_cover_2018',
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            opacity: 0.45, // Sovrapposizione trasparente ottimale
            attribution: 'Ministero Ambiente'
        }).addTo(map);

        // Pannello di controllo
        const baseMaps = {
            "🗺️ Mappa Base (OSM)": osm
        };

        const overlayMaps = {
            "🌊 Fiumi e Fossi (PCN)": idrografia,
            "🌳 Mappa Boschi (PCN)": usoSuolo
        };

        L.control.layers(baseMaps, overlayMaps, { collapsed: false }).addTo(map);

        // GEOLOCALIZZAZIONE GPS
        let userMarker = null;
        let userCircle = null;

        function trovaPosizione() {
            if (!navigator.geolocation) {
                alert("La geolocalizzazione non è supportata dal tuo dispositivo.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const accuracy = position.coords.accuracy;

                    if (userMarker) {
                        map.removeLayer(userMarker);
                        map.removeLayer(userCircle);
                    }

                    userMarker = L.marker([lat, lon]).addTo(map)
                        .bindPopup(`<b>Sei qui</b><br>Precisione GPS: ${Math.round(accuracy)} metri`).openPopup();

                    userCircle = L.circle([lat, lon], { radius: accuracy, color: '#1a73e8', fillOpacity: 0.15 }).addTo(map);

                    // Zoom ravvicinato al bosco
                    map.setView([lat, lon], 16);
                },
                (error) => {
                    alert("Attiva il GPS del telefono e autorizza il browser a leggere la posizione.");
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }
    </script>
</body>
</html>
